type Pool @entity {
  id: ID!
  token0: String!
  token1: String!
  feeTier: Int!
  liquidity: BigInt!
  totalValueLockedUSD: BigDecimal!
  volumeUSD: BigDecimal!
  createdAtTimestamp: BigInt!
}

type Swap @entity {
  id: ID!
  pool: Pool!
  sender: Bytes!
  recipient: Bytes!
  amount0: BigInt!
  amount1: BigInt!
  timestamp: BigInt!
}
