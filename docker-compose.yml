services:
  graph-postgres:
    image: postgres:16
    command: ["postgres", "-cshared_preload_libraries=pg_stat_statements", "-cmax_connections=200"]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data
    volumes:
      - graphdata:/var/lib/postgresql/data
      - ./infra/graph-node/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node -d graph-node"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
      - "8080:8080"

  graph-node:
    image: graphprotocol/graph-node:latest
    depends_on:
      graph-postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
    environment:
      postgres_host: graph-postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "mst:https://rpc.mstchain.io"
    ports:
      - "8000:8000"
      - "8020:8020"

  frontend:
    build: ./frontend
    environment:
      VITE_WMST_ADDRESS: ${WMST_ADDRESS}
      VITE_SWAP_ROUTER_ADDRESS: ${SWAP_ROUTER_ADDRESS}
      VITE_QUOTER_V2_ADDRESS: ${QUOTER_V2_ADDRESS}
      VITE_USDC_ADDRESS: ${USDC_ADDRESS:-}
      VITE_USDC_DECIMALS: ${VITE_USDC_DECIMALS:-18}
      VITE_USDT_ADDRESS: ${USDT_ADDRESS:-}
      VITE_WBTC_ADDRESS: ${WBTC_ADDRESS:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  graphdata:
