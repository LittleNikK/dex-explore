[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib"]
test = "contracts/test"
script = "contracts/script"
cache_path = "contracts/cache"
auto_detect_solc = true
optimizer = true
optimizer_runs = 800
bytecode_hash = "none"
cbor_metadata = false
evm_version = "cancun"
ffi = true
fs_permissions = [
  { access = "read-write", path = "./contracts" }
]
gas_reports = ["*"]
remappings = [
  "@openzeppelin/=contracts/lib/openzeppelin-contracts/",
  "forge-std/=contracts/lib/forge-std-master/src/",
  "@uniswap/v3-core/=contracts/lib/v3-core-main/",
  "@uniswap/v3-periphery/=contracts/lib/v3-periphery-main/",
  "v3-core/=contracts/lib/v3-core-main/contracts/",
  "v3-periphery/=contracts/lib/v3-periphery-main/contracts/"
]
